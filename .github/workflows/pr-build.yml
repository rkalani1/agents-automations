name: PR build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site (strict)
        run: mkdocs build --strict --site-dir _site

      - name: Run built-site QA
        run: node scripts/qa-site.mjs _site

      - name: Validate starter kits
        run: node scripts/validate-starter-kits.mjs

      - name: Upload built site (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.event.pull_request.number || github.run_id }}
          path: _site
          retention-days: 7
