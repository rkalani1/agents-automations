name: Link check

# Runs two passes:
#   1. internal-links — strict, GATING. Fails the workflow if a relative or
#      anchor link inside the repo is broken.
#   2. external-links — advisory, NON-GATING. Reports broken HTTP/HTTPS links
#      as a downloadable artifact. External hosts go down for many reasons that
#      are not the repo's fault, so we never fail PRs on them.
#
# Triggered on demand (workflow_dispatch) and on PRs that touch Markdown.
# Not scheduled (per ADR 0003).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/**/*.md"
      - "*.md"
      - "starter-kits/**/*.md"
      - "evals/**/*.md"

permissions:
  contents: read

jobs:
  internal-links:
    name: Internal links (gating)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee on internal links only
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline disables HTTP requests; lychee resolves only relative
          # and anchor links against the local file tree.
          # Known false positive: lychee does not index HTML element ids
          # inside Markdown, so the in-page '#fix-answer' anchor in
          # docs/mastery/claude.md (a raw-HTML <section id="fix-answer">)
          # is excluded; it is verified manually on the built site.
          args: >-
            --offline
            --no-progress
            --include-fragments
            --exclude-path _site
            --exclude-path site
            --exclude 'claude\.md#fix-answer'
            './**/*.md'
          fail: true
          format: markdown
          output: lychee-internal.md

      - name: Upload internal-link report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-internal
          path: lychee-internal.md
          retention-days: 14

  external-links:
    name: External links (advisory)
    runs-on: ubuntu-latest
    # Don't gate the PR on external host availability.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee on external links only
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            --accept 200,206,403,429
            --exclude-mail
            --exclude-path _site
            --exclude-path site
            --exclude '^https?://localhost'
            --exclude '^https?://127\.0\.0\.1'
            --exclude '^/'
            --exclude '^\.\.?/'
            --exclude '^#'
            './**/*.md'
          fail: false
          format: markdown
          output: lychee-external.md

      - name: Upload external-link report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-external
          path: lychee-external.md
          retention-days: 14
