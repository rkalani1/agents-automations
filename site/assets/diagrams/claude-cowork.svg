<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="Schematic of Claude Cowork: a Project + a Cowork pane that schedules recurring runs">
<defs>
<style>
text { font: 14px system-ui, -apple-system, sans-serif; fill: #222; }
.h { font-weight: 600; }
.sub { font-size: 12px; fill: #555; }
.box { fill: #fff; stroke: #888; }
.accent { fill: #f3eefa; stroke: #6a3a9a; }
.warn { fill: #fff7e6; stroke: #b8860b; }
</style>
</defs>
<rect x="0" y="0" width="720" height="320" fill="#fafafa"/>
<text x="20" y="28" class="h">Claude Cowork — project + scheduled task (schematic)</text>
<text x="20" y="46" class="sub">A Cowork pane on a Project schedules recurring runs. Result lands in the Project's chat / artifacts.</text>
<rect x="20" y="70" width="240" height="220" class="box accent"/>
<text x="32" y="92" class="h">Project</text>
<text x="32" y="112" class="sub">Project Instructions</text>
<text x="32" y="128" class="sub">Project Knowledge</text>
<text x="32" y="160" class="h">Cowork pane</text>
<text x="32" y="180" class="sub">+ New scheduled task</text>
<rect x="32" y="194" width="216" height="60" class="box"/>
<text x="44" y="214" class="sub">Daily morning brief</text>
<text x="44" y="232" class="sub">Mon–Fri 7:30 PT</text>
<text x="44" y="250" class="sub">Drafts only</text>
<rect x="290" y="70" width="220" height="220" class="box"/>
<text x="302" y="92" class="h">When the task fires</text>
<text x="302" y="116" class="sub">Claude runs the prompt</text>
<text x="302" y="132" class="sub">inherited from the Project</text>
<text x="302" y="148" class="sub">Instructions + Knowledge.</text>
<text x="302" y="174" class="sub">Output appears in the</text>
<text x="302" y="190" class="sub">Project's chat / artifact</text>
<text x="302" y="206" class="sub">area.</text>
<text x="302" y="232" class="sub">Connectors used must</text>
<text x="302" y="248" class="sub">remain authorised — silent</text>
<text x="302" y="264" class="sub">re-auth failures are common.</text>
<rect x="540" y="70" width="160" height="220" class="box warn"/>
<text x="552" y="92" class="h">Off-switch</text>
<text x="552" y="114" class="sub">Cowork pane → pause /</text>
<text x="552" y="130" class="sub">delete the task.</text>
<text x="552" y="156" class="sub">Audit weekly.</text>
<text x="552" y="174" class="sub">Drift risk: high.</text>
<text x="552" y="200" class="sub">Always do 3 manual</text>
<text x="552" y="216" class="sub">runs before scheduling.</text>
</svg>
