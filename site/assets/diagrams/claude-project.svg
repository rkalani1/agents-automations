<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Schematic of a Claude Project: Project Instructions + Project Knowledge + chats inside the Project">
<defs>
<style>
text { font: 14px system-ui, -apple-system, sans-serif; fill: #222; }
.h { font-weight: 600; }
.sub { font-size: 12px; fill: #555; }
.box { fill: #fff; stroke: #888; }
.accent { fill: #f3eefa; stroke: #6a3a9a; }
.muted { fill: #f6f6f6; stroke: #bbb; }
</style>
</defs>
<rect x="0" y="0" width="720" height="360" fill="#fafafa"/>
<text x="20" y="28" class="h">Claude Project (schematic)</text>
<text x="20" y="46" class="sub">Project Instructions + Project Knowledge are persistent. Every chat inside the Project inherits both.</text>
<rect x="20" y="70" width="180" height="260" class="box muted"/>
<text x="32" y="92" class="h">Sidebar</text>
<text x="32" y="116">+ New Project</text>
<rect x="32" y="128" width="156" height="26" class="box accent"/>
<text x="40" y="146">Lit summariser</text>
<rect x="32" y="160" width="156" height="26" class="box"/>
<text x="40" y="178">Daily brief</text>
<rect x="32" y="192" width="156" height="26" class="box"/>
<text x="40" y="210">Trip planner</text>
<rect x="220" y="70" width="480" height="260" class="box accent"/>
<text x="232" y="92" class="h">Project: Lit summariser</text>
<rect x="232" y="108" width="220" height="120" class="box"/>
<text x="244" y="126" class="h">Project Instructions</text>
<text x="244" y="146" class="sub">Persistent system prompt.</text>
<text x="244" y="162" class="sub">NEJM citation style.</text>
<text x="244" y="178" class="sub">"What we don't know"</text>
<text x="244" y="194" class="sub">section required.</text>
<text x="244" y="210" class="sub">Never invent citations.</text>
<rect x="464" y="108" width="224" height="120" class="box"/>
<text x="476" y="126" class="h">Project Knowledge</text>
<text x="476" y="146" class="sub">Reference PDFs / DOCX.</text>
<text x="476" y="162" class="sub">Trusted-journal list.</text>
<text x="476" y="178" class="sub">Author preference doc.</text>
<text x="476" y="210" class="sub">Synthetic only — no PHI.</text>
<rect x="232" y="240" width="456" height="80" class="box"/>
<text x="244" y="260" class="h">Chats inside the Project</text>
<text x="244" y="280" class="sub">Each chat inherits Instructions + Knowledge automatically.</text>
<text x="244" y="300" class="sub">Cowork (where rolled out) lets you schedule a chat to run recurrently.</text>
</svg>
