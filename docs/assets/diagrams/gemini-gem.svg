<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="Schematic of a Gemini Gem: Instructions + Files + start a chat">
<defs>
<style>
text { font: 14px system-ui, -apple-system, sans-serif; fill: #222; }
.h { font-weight: 600; }
.sub { font-size: 12px; fill: #555; }
.box { fill: #fff; stroke: #888; }
.accent { fill: #eef9ee; stroke: #2e7d32; }
.muted { fill: #f6f6f6; stroke: #bbb; }
</style>
</defs>
<rect x="0" y="0" width="720" height="320" fill="#fafafa"/>
<text x="20" y="28" class="h">Gemini Gem (schematic)</text>
<text x="20" y="46" class="sub">Instructions + (where supported) attached files. Open a chat with the Gem to inherit them.</text>
<rect x="20" y="70" width="180" height="220" class="box muted"/>
<text x="32" y="92" class="h">Gem manager</text>
<text x="32" y="116">+ New Gem</text>
<rect x="32" y="128" width="156" height="26" class="box accent"/>
<text x="40" y="146">Lit summariser</text>
<rect x="32" y="160" width="156" height="26" class="box"/>
<text x="40" y="178">Trip planner</text>
<rect x="220" y="70" width="240" height="220" class="box accent"/>
<text x="232" y="92" class="h">Gem: Lit summariser</text>
<rect x="232" y="108" width="216" height="76" class="box"/>
<text x="244" y="126" class="h">Instructions</text>
<text x="244" y="146" class="sub">Persistent system prompt</text>
<text x="244" y="162" class="sub">Tone, format, refusal rules</text>
<rect x="232" y="194" width="216" height="80" class="box"/>
<text x="244" y="212" class="h">Files (where supported)</text>
<text x="244" y="232" class="sub">Reference docs</text>
<text x="244" y="248" class="sub">Trusted-source list</text>
<text x="244" y="264" class="sub">Synthetic only — no PHI</text>
<rect x="480" y="70" width="220" height="220" class="box"/>
<text x="492" y="92" class="h">Open chat with Gem</text>
<text x="492" y="116" class="sub">Inherits Instructions</text>
<text x="492" y="132" class="sub">+ Files automatically.</text>
<text x="492" y="160" class="sub">Schedule a recurring run</text>
<text x="492" y="176" class="sub">via Settings &amp; help →</text>
<text x="492" y="192" class="sub">Scheduled actions</text>
<text x="492" y="208" class="sub">(Advanced, where rolled out).</text>
<text x="492" y="240" class="sub">Workspace integration:</text>
<text x="492" y="256" class="sub">Drive / Calendar / Mail</text>
<text x="492" y="272" class="sub">read-only context.</text>
</svg>
