<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Schematic of a ChatGPT Project: sidebar with Projects list, a Project containing Instructions, Files, and a Chats list">
<defs>
<style>
text { font: 14px system-ui, -apple-system, sans-serif; fill: #222; }
.h { font-weight: 600; }
.sub { font-size: 12px; fill: #555; }
.box { fill: #fff; stroke: #888; stroke-width: 1; }
.accent { fill: #eef5ff; stroke: #3a6ea5; }
.muted { fill: #f6f6f6; stroke: #bbb; }
.arrow { stroke: #3a6ea5; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
<path d="M0,0 L10,5 L0,10 Z" fill="#3a6ea5"/>
</marker>
</defs>
<rect x="0" y="0" width="720" height="360" fill="#fafafa"/>
<text x="20" y="28" class="h">ChatGPT Project (schematic)</text>
<text x="20" y="46" class="sub">Sidebar lists Projects. Inside a Project: persistent Instructions, Files, and Chats that inherit them.</text>
<rect x="20" y="70" width="180" height="260" class="box muted"/>
<text x="32" y="92" class="h">Sidebar</text>
<text x="32" y="116">+ New Project</text>
<rect x="32" y="128" width="156" height="26" class="box accent"/>
<text x="40" y="146">Daily brief</text>
<rect x="32" y="160" width="156" height="26" class="box"/>
<text x="40" y="178">Difficult email coach</text>
<rect x="32" y="192" width="156" height="26" class="box"/>
<text x="40" y="210">Trip planner</text>
<rect x="220" y="70" width="480" height="260" class="box accent"/>
<text x="232" y="92" class="h">Project: Daily brief</text>
<rect x="232" y="108" width="220" height="100" class="box"/>
<text x="244" y="126" class="h">Instructions</text>
<text x="244" y="146" class="sub">Persistent system prompt</text>
<text x="244" y="162" class="sub">Tone, role, constraints</text>
<text x="244" y="178" class="sub">Inherited by every chat in</text>
<text x="244" y="194" class="sub">this Project.</text>
<rect x="464" y="108" width="224" height="100" class="box"/>
<text x="476" y="126" class="h">Files</text>
<text x="476" y="146" class="sub">Reference docs</text>
<text x="476" y="162" class="sub">Synthetic only — no PHI</text>
<text x="476" y="178" class="sub">/ secrets / credentials</text>
<rect x="232" y="220" width="456" height="96" class="box"/>
<text x="244" y="240" class="h">Chats inside the Project</text>
<text x="244" y="262" class="sub">Each chat inherits Instructions + Files automatically.</text>
<text x="244" y="282" class="sub">No need to re-paste system prompt or upload files again.</text>
<text x="244" y="304" class="sub">Schedule a Task on a chat where the feature is rolled out.</text>
<path class="arrow" d="M188 144 L222 144"/>
</svg>
