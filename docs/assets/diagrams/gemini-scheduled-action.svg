<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="Schematic of a Gemini scheduled action: a saved prompt + cadence + (optional Gem) running on a schedule">
<defs>
<style>
text { font: 14px system-ui, -apple-system, sans-serif; fill: #222; }
.h { font-weight: 600; }
.sub { font-size: 12px; fill: #555; }
.box { fill: #fff; stroke: #888; }
.accent { fill: #eef9ee; stroke: #2e7d32; }
.warn { fill: #fff7e6; stroke: #b8860b; }
</style>
</defs>
<rect x="0" y="0" width="720" height="280" fill="#fafafa"/>
<text x="20" y="28" class="h">Gemini scheduled action (schematic)</text>
<text x="20" y="46" class="sub">A prompt + cadence + timezone. Optionally tied to a Gem so it inherits Instructions and Files.</text>
<rect x="20" y="70" width="220" height="180" class="box accent"/>
<text x="32" y="92" class="h">Saved prompt</text>
<text x="32" y="112" class="sub">Self-contained.</text>
<text x="32" y="128" class="sub">{{TODAY}} placeholder.</text>
<text x="32" y="144" class="sub">Drafts only.</text>
<text x="32" y="170" class="h">Cadence + timezone</text>
<text x="32" y="188" class="sub">Daily / weekly</text>
<text x="32" y="204" class="sub">Always set timezone</text>
<text x="32" y="220" class="sub">explicitly.</text>
<rect x="270" y="70" width="200" height="180" class="box"/>
<text x="282" y="92" class="h">(Optional) Gem</text>
<text x="282" y="112" class="sub">If you point the schedule</text>
<text x="282" y="128" class="sub">at a Gem, it inherits the</text>
<text x="282" y="144" class="sub">Gem's Instructions + Files.</text>
<text x="282" y="172" class="sub">Workspace connectors</text>
<text x="282" y="188" class="sub">(Drive / Calendar / Mail)</text>
<text x="282" y="204" class="sub">are read-only by default.</text>
<rect x="500" y="70" width="200" height="180" class="box warn"/>
<text x="512" y="92" class="h">Off-switch</text>
<text x="512" y="114" class="sub">Settings &amp; help →</text>
<text x="512" y="130" class="sub">Scheduled actions →</text>
<text x="512" y="146" class="sub">toggle off / remove.</text>
<text x="512" y="172" class="sub">Drift risk: high.</text>
<text x="512" y="190" class="sub">3 manual runs first.</text>
<text x="512" y="206" class="sub">Set a cost cap if</text>
<text x="512" y="222" class="sub">available.</text>
</svg>
